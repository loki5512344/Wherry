document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"7320b5d2-f6f2-47b6-aaa0-942ef1603b09\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <script src=\"8f878b98-87b3-4745-9dee-c77a19efa0cd\"><\u002Fscript>\n  <style>\n    @keyframes lf-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }\n    ::-webkit-scrollbar { width: 10px; height: 10px; }\n    ::-webkit-scrollbar-thumb { background: #33302a; border-radius: 6px; border: 2px solid #201d19; }\n    ::-webkit-scrollbar-track { background: transparent; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100%;min-height:100vh;background:radial-gradient(ellipse at 30% 0%, #241f18 0%, #16130f 55%, #100e0b 100%);display:flex;align-items:center;justify-content:center;padding:48px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;\">\n\n  <div style=\"width:1360px;height:820px;border-radius:12px;overflow:hidden;background:#201D19;box-shadow:0 50px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);display:flex;flex-direction:column;position:relative;\">\n\n    <!-- Titlebar -->\n    <div style=\"height:36px;min-height:36px;background:#191611;border-bottom:1px solid #2E2A24;display:flex;align-items:center;padding:0 14px;position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:8px;\">\n        <div style=\"width:12px;height:12px;border-radius:50%;background:#EC6A5E;\"><\u002Fdiv>\n        <div style=\"width:12px;height:12px;border-radius:50%;background:#F5BD4F;\"><\u002Fdiv>\n        <div style=\"width:12px;height:12px;border-radius:50%;background:#61C454;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:50%;transform:translateX(-50%);color:#A69C8E;font-size:12.5px;letter-spacing:0.2px;\">{{ windowTitle }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Toolbar -->\n    <div style=\"height:48px;min-height:48px;background:#191611;border-bottom:1px solid #2E2A24;display:flex;align-items:center;padding:0 12px;gap:6px;\">\n      <div style=\"display:flex;align-items:center;gap:6px;margin-right:4px;\">\n        <iconify-icon icon=\"solar:folder-bold\" style=\"font-size:17px;color:#C1673C;\"><\u002Ficonify-icon>\n        <span style=\"color:#EDE8E0;font-size:14px;font-weight:600;letter-spacing:0.2px;\">LoFlum<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:20px;background:#2E2A24;\"><\u002Fdiv>\n\n      <button onclick=\"{{ openConnectDialog }}\" style=\"display:flex;align-items:center;gap:6px;height:30px;padding:0 12px;border-radius:6px;border:none;background:#8B4A2C;color:#EDE8E0;font-size:12.5px;font-weight:500;cursor:pointer;\" style-hover=\"background:#a05a37;\">\n        <iconify-icon icon=\"solar:add-circle-linear\" style=\"font-size:15px;\"><\u002Ficonify-icon>\n        New Connection\n      <\u002Fbutton>\n\n      <div style=\"width:1px;height:20px;background:#2E2A24;\"><\u002Fdiv>\n\n      <button style=\"display:flex;align-items:center;gap:6px;height:30px;padding:0 10px;border-radius:6px;border:none;background:transparent;color:{{ uploadColor }};font-size:12.5px;cursor:pointer;\" style-hover=\"background:#262019;\">\n        <iconify-icon icon=\"solar:upload-linear\" style=\"font-size:15px;\"><\u002Ficonify-icon>\n        Upload\n      <\u002Fbutton>\n      <button style=\"display:flex;align-items:center;gap:6px;height:30px;padding:0 10px;border-radius:6px;border:none;background:transparent;color:{{ downloadColor }};font-size:12.5px;cursor:pointer;\" style-hover=\"background:#262019;\">\n        <iconify-icon icon=\"solar:download-linear\" style=\"font-size:15px;\"><\u002Ficonify-icon>\n        Download\n      <\u002Fbutton>\n\n      <div style=\"width:1px;height:20px;background:#2E2A24;\"><\u002Fdiv>\n\n      <button onclick=\"{{ toggleQueue }}\" style=\"display:flex;align-items:center;gap:6px;height:30px;padding:0 10px;border-radius:6px;border:none;background:{{ queueBtnBg }};color:{{ queueBtnColor }};font-size:12.5px;cursor:pointer;\" style-hover=\"background:#262019;\">\n        <iconify-icon icon=\"solar:clock-circle-linear\" style=\"font-size:15px;\"><\u002Ficonify-icon>\n        Queue\n        <sc-if value=\"{{ queueCount }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"background:#C1673C;color:#191611;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:8px;\">{{ queueCount }}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fbutton>\n\n      <div style=\"width:1px;height:20px;background:#2E2A24;\"><\u002Fdiv>\n\n      <button style=\"display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:none;background:transparent;color:{{ connectedIconColor }};cursor:pointer;\" style-hover=\"background:#262019;\" title=\"Refresh\">\n        <iconify-icon icon=\"solar:refresh-linear\" style=\"font-size:16px;\"><\u002Ficonify-icon>\n      <\u002Fbutton>\n      <button onclick=\"{{ openMkdirDialog }}\" style=\"display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:none;background:transparent;color:{{ connectedIconColor }};cursor:pointer;\" style-hover=\"background:#262019;\" title=\"New Folder\">\n        <iconify-icon icon=\"solar:folder-with-files-linear\" style=\"font-size:16px;\"><\u002Ficonify-icon>\n      <\u002Fbutton>\n      <button onclick=\"{{ openDeleteDialog }}\" style=\"display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:none;background:transparent;color:{{ connectedIconColor }};cursor:pointer;\" style-hover=\"background:#3a241d;\" title=\"Delete\">\n        <iconify-icon icon=\"solar:trash-bin-minimalistic-linear\" style=\"font-size:16px;\"><\u002Ficonify-icon>\n      <\u002Fbutton>\n      <button onclick=\"{{ openRenameDialog }}\" style=\"display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:none;background:transparent;color:{{ connectedIconColor }};cursor:pointer;\" style-hover=\"background:#262019;\" title=\"Rename\">\n        <iconify-icon icon=\"solar:pen-linear\" style=\"font-size:16px;\"><\u002Ficonify-icon>\n      <\u002Fbutton>\n\n      <div style=\"flex:1;\"><\u002Fdiv>\n\n      <button onclick=\"{{ toggleHistory }}\" style=\"display:flex;align-items:center;gap:6px;height:30px;padding:0 10px;border-radius:6px;border:none;background:{{ historyBtnBg }};color:{{ historyBtnColor }};font-size:12.5px;cursor:pointer;position:relative;\" style-hover=\"background:#262019;\">\n        <iconify-icon icon=\"solar:history-linear\" style=\"font-size:15px;\"><\u002Ficonify-icon>\n        History\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- History popup -->\n    <sc-if value=\"{{ historyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;top:88px;right:12px;width:270px;background:#201d19;border:1px solid #2E2A24;border-radius:8px;box-shadow:0 20px 40px rgba(0,0,0,0.5);padding:10px;z-index:50;\">\n        <div style=\"color:#A69C8E;font-size:11px;font-weight:600;letter-spacing:0.3px;padding:2px 4px 8px;\">RECENT CONNECTIONS<\u002Fdiv>\n        <sc-for list=\"{{ historyItems }}\" as=\"h\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:5px;cursor:pointer;\" style-hover=\"background:#262019;\">\n            <div style=\"display:flex;align-items:center;gap:8px;\">\n              <iconify-icon icon=\"solar:server-square-linear\" style=\"font-size:14px;color:#A69C8E;\"><\u002Ficonify-icon>\n              <span style=\"color:#EDE8E0;font-size:12px;\">{{ h.label }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"color:#6E655A;font-size:10.5px;\">{{ h.time }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Tab bar -->\n    <div style=\"height:36px;min-height:36px;background:#17140F;border-bottom:1px solid #2E2A24;display:flex;align-items:center;padding:6px 10px;gap:6px;\">\n      <sc-if value=\"{{ connected }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:center;gap:8px;height:24px;padding:0 10px;border-radius:6px;background:#241D14;color:#EDE8E0;font-size:12px;\">\n          <div style=\"width:6px;height:6px;border-radius:50%;background:#7A9471;\"><\u002Fdiv>\n          {{ tabLabel }}\n          <span onclick=\"{{ disconnect }}\" style=\"color:#6E655A;cursor:pointer;font-size:13px;line-height:1;\" style-hover=\"color:#EDE8E0;\">×<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <button onclick=\"{{ openConnectDialog }}\" style=\"display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:#6E655A;font-size:15px;cursor:pointer;\" style-hover=\"background:#241D14;color:#EDE8E0;\">+<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Body -->\n    <div style=\"flex:1;display:flex;overflow:hidden;min-height:0;\">\n\n      <!-- Sidebar -->\n      <div style=\"width:200px;min-width:200px;background:#191611;border-right:1px solid #2E2A24;overflow-y:auto;padding:10px 0;\">\n\n        <div style=\"color:#6E655A;font-size:10.5px;font-weight:700;letter-spacing:0.5px;padding:2px 14px 6px;\">LOCAL<\u002Fdiv>\n        <sc-for list=\"{{ localBookmarks }}\" as=\"b\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ b.onClick }}\" style=\"display:flex;align-items:center;gap:8px;height:28px;margin:0 8px;padding:0 8px;border-radius:5px;cursor:pointer;background:{{ b.bg }};\" style-hover=\"background:#262019;\">\n            <iconify-icon icon=\"{{ b.icon }}\" style=\"font-size:14px;color:{{ b.color }};\"><\u002Ficonify-icon>\n            <span style=\"font-size:12.5px;color:{{ b.textColor }};\">{{ b.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <div style=\"height:1px;background:#28241E;margin:10px 14px;\"><\u002Fdiv>\n        <div style=\"color:#6E655A;font-size:10.5px;font-weight:700;letter-spacing:0.5px;padding:2px 14px 6px;\">DRIVES<\u002Fdiv>\n        <sc-for list=\"{{ drives }}\" as=\"d\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;align-items:center;gap:8px;height:28px;margin:0 8px;padding:0 8px;border-radius:5px;cursor:pointer;\" style-hover=\"background:#262019;\">\n            <iconify-icon icon=\"{{ d.icon }}\" style=\"font-size:14px;color:#A69C8E;\"><\u002Ficonify-icon>\n            <span style=\"font-size:12.5px;color:#EDE8E0;\">{{ d.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <div style=\"height:1px;background:#28241E;margin:10px 14px;\"><\u002Fdiv>\n        <div style=\"color:#6E655A;font-size:10.5px;font-weight:700;letter-spacing:0.5px;padding:2px 14px 6px;\">BOOKMARKS<\u002Fdiv>\n        <div style=\"padding:4px 14px;\">\n          <div style=\"color:#6E655A;font-size:11px;\">No bookmarks yet<\u002Fdiv>\n          <div style=\"color:#6E655A;font-size:10px;margin-top:2px;\">Use ★ in file list<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Local + Remote panes -->\n      <div style=\"flex:1;display:flex;min-width:0;\">\n\n        <!-- LOCAL -->\n        <div style=\"flex:1;display:flex;flex-direction:column;border-right:1px solid #2E2A24;min-width:0;\">\n          <div style=\"height:30px;min-height:30px;background:#17140F;border-bottom:1px solid #2E2A24;display:flex;align-items:center;padding:0 12px;justify-content:space-between;\">\n            <span style=\"color:#A69C8E;font-size:10.5px;font-weight:700;letter-spacing:0.5px;\">LOCAL<\u002Fspan>\n            <span style=\"color:#6E655A;font-size:11px;font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;\">{{ localPath }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow-y:auto;padding:4px 0;\">\n            <div style=\"display:flex;align-items:center;height:24px;padding:0 12px;color:#6E655A;font-size:10.5px;font-weight:600;gap:0;\">\n              <span style=\"flex:1;\">Name<\u002Fspan>\n              <span style=\"width:80px;text-align:right;\">Size<\u002Fspan>\n              <span style=\"width:110px;text-align:right;\">Modified<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ localFiles }}\" as=\"f\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex;align-items:center;height:28px;padding:0 12px;border-radius:5px;margin:0 4px;cursor:default;background:{{ f.bg }};\" style-hover=\"background:#262019;\">\n                <div style=\"flex:1;display:flex;align-items:center;gap:8px;min-width:0;\">\n                  <iconify-icon icon=\"{{ f.icon }}\" style=\"font-size:15px;color:{{ f.iconColor }};flex-shrink:0;\"><\u002Ficonify-icon>\n                  <span style=\"font-size:12.5px;color:#EDE8E0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ f.name }}<\u002Fspan>\n                <\u002Fdiv>\n                <span style=\"width:80px;text-align:right;font-size:11px;color:#A69C8E;font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;\">{{ f.size }}<\u002Fspan>\n                <span style=\"width:110px;text-align:right;font-size:11px;color:#6E655A;font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;\">{{ f.modified }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- REMOTE -->\n        <div style=\"flex:1;display:flex;flex-direction:column;min-width:0;\">\n          <sc-if value=\"{{ connected }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"height:30px;min-height:30px;background:#17140F;border-bottom:1px solid #2E2A24;display:flex;align-items:center;padding:0 12px;justify-content:space-between;\">\n              <span style=\"color:#A69C8E;font-size:10.5px;font-weight:700;letter-spacing:0.5px;\">REMOTE · {{ remoteHost }}<\u002Fspan>\n              <span style=\"color:#6E655A;font-size:11px;font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;\">{{ remotePath }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:1;overflow-y:auto;padding:4px 0;\">\n              <div style=\"display:flex;align-items:center;height:24px;padding:0 12px;color:#6E655A;font-size:10.5px;font-weight:600;\">\n                <span style=\"flex:1;\">Name<\u002Fspan>\n                <span style=\"width:80px;text-align:right;\">Size<\u002Fspan>\n                <span style=\"width:110px;text-align:right;\">Modified<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ remoteFiles }}\" as=\"f\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex;align-items:center;height:28px;padding:0 12px;border-radius:5px;margin:0 4px;cursor:default;background:{{ f.bg }};\" style-hover=\"background:#262019;\">\n                  <div style=\"flex:1;display:flex;align-items:center;gap:8px;min-width:0;\">\n                    <iconify-icon icon=\"{{ f.icon }}\" style=\"font-size:15px;color:{{ f.iconColor }};flex-shrink:0;\"><\u002Ficonify-icon>\n                    <span style=\"font-size:12.5px;color:#EDE8E0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ f.name }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"width:80px;text-align:right;font-size:11px;color:#A69C8E;font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;\">{{ f.size }}<\u002Fspan>\n                  <span style=\"width:110px;text-align:right;font-size:11px;color:#6E655A;font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;\">{{ f.modified }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notConnected }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"height:30px;min-height:30px;background:#17140F;border-bottom:1px solid #2E2A24;display:flex;align-items:center;padding:0 12px;\">\n              <span style=\"color:#A69C8E;font-size:10.5px;font-weight:700;letter-spacing:0.5px;\">REMOTE<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;\">\n                <div style=\"width:56px;height:56px;border-radius:50%;background:#241D14;display:flex;align-items:center;justify-content:center;\">\n                  <iconify-icon icon=\"solar:server-square-linear\" style=\"font-size:26px;color:#6E655A;\"><\u002Ficonify-icon>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;\">\n                  <span style=\"color:#A69C8E;font-size:13.5px;font-weight:600;\">Remote<\u002Fspan>\n                  <span style=\"color:#6E655A;font-size:12px;\">Connect to a server to browse files<\u002Fspan>\n                <\u002Fdiv>\n                <button onclick=\"{{ openConnectDialog }}\" style=\"display:flex;align-items:center;gap:7px;margin-top:6px;height:34px;padding:0 16px;border-radius:7px;border:none;background:#C1673C;color:#1a1611;font-size:12.5px;font-weight:600;cursor:pointer;\" style-hover=\"background:#d07a4e;\">\n                  <iconify-icon icon=\"solar:add-circle-bold\" style=\"font-size:15px;\"><\u002Ficonify-icon>\n                  New Connection\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Queue panel -->\n    <div style=\"min-height:34px;background:#161310;border-top:1px solid #2E2A24;display:flex;flex-direction:column;overflow:hidden;height:{{ queueHeight }};\">\n      <div onclick=\"{{ toggleQueue }}\" style=\"height:34px;min-height:34px;display:flex;align-items:center;padding:0 12px;gap:8px;cursor:pointer;\">\n        <iconify-icon icon=\"{{ queueChevron }}\" style=\"font-size:13px;color:#6E655A;\"><\u002Ficonify-icon>\n        <span style=\"color:#A69C8E;font-size:11.5px;font-weight:600;\">Transfer Queue<\u002Fspan>\n        <span style=\"color:#6E655A;font-size:11px;\">{{ queueSummary }}<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ queueExpanded }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:1;overflow-y:auto;padding:2px 12px 10px;display:flex;flex-direction:column;gap:6px;\">\n          <sc-for list=\"{{ queueTasks }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:10px;height:34px;\">\n              <iconify-icon icon=\"{{ t.dirIcon }}\" style=\"font-size:15px;color:{{ t.dirColor }};flex-shrink:0;\"><\u002Ficonify-icon>\n              <span style=\"width:170px;font-size:12px;color:#EDE8E0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;\">{{ t.name }}<\u002Fspan>\n              <div style=\"flex:1;height:6px;border-radius:3px;background:#28241E;overflow:hidden;\">\n                <div style=\"height:100%;border-radius:3px;background:{{ t.barColor }};width:{{ t.progressWidth }};\"><\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"width:38px;text-align:right;font-size:11px;color:#A69C8E;font-family:ui-monospace,monospace;\">{{ t.progressLabel }}<\u002Fspan>\n              <span style=\"width:80px;text-align:right;font-size:10.5px;color:#6E655A;\">{{ t.statusLabel }}<\u002Fspan>\n              <button style=\"width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:#6E655A;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;\" style-hover=\"background:#262019;color:#EDE8E0;\">\n                <iconify-icon icon=\"{{ t.actionIcon }}\" style=\"font-size:13px;\"><\u002Ficonify-icon>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- Status bar -->\n    <div style=\"height:26px;min-height:26px;background:#17140F;border-top:1px solid #2E2A24;display:flex;align-items:center;padding:0 12px;justify-content:space-between;\">\n      <span style=\"color:#6E655A;font-size:11px;\">{{ statusMessage }}<\u002Fspan>\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <sc-if value=\"{{ connected }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"display:flex;align-items:center;gap:5px;color:#7A9471;font-size:11px;\">\n            <iconify-icon icon=\"solar:lock-password-bold\" style=\"font-size:12px;\"><\u002Ficonify-icon>\n            SFTP\n          <\u002Fspan>\n        <\u002Fsc-if>\n        <span style=\"color:#6E655A;font-size:11px;\">{{ connectedCountLabel }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ Dialog overlays ============ -->\n\n    <sc-if value=\"{{ showConnect }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;background:rgba(10,8,6,0.55);display:flex;align-items:center;justify-content:center;z-index:100;\">\n        <div style=\"width:380px;background:#191611;border:1px solid #2E2A24;border-radius:10px;box-shadow:0 30px 60px rgba(0,0,0,0.5);padding:22px;\">\n          <div style=\"color:#EDE8E0;font-size:15px;font-weight:600;margin-bottom:16px;\">New Connection<\u002Fdiv>\n\n          <div style=\"display:flex;gap:6px;margin-bottom:14px;\">\n            <sc-for list=\"{{ protocols }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ p.onClick }}\" style=\"flex:1;height:28px;border-radius:6px;border:none;font-size:11.5px;font-weight:600;cursor:pointer;background:{{ p.bg }};color:{{ p.color }};\">{{ p.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <div style=\"display:flex;flex-direction:column;gap:4px;\">\n              <label style=\"color:#A69C8E;font-size:11px;\">Host<\u002Flabel>\n              <input value=\"{{ connectHost }}\" oninput=\"{{ setConnectHost }}\" placeholder=\"ftp.example.com\" style=\"height:30px;background:#201d19;border:1px solid #2E2A24;border-radius:6px;padding:0 10px;color:#EDE8E0;font-size:12.5px;outline:none;\">\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px;\">\n              <div style=\"flex:1;display:flex;flex-direction:column;gap:4px;\">\n                <label style=\"color:#A69C8E;font-size:11px;\">Username<\u002Flabel>\n                <input value=\"{{ connectUser }}\" oninput=\"{{ setConnectUser }}\" placeholder=\"user\" style=\"height:30px;background:#201d19;border:1px solid #2E2A24;border-radius:6px;padding:0 10px;color:#EDE8E0;font-size:12.5px;outline:none;\">\n              <\u002Fdiv>\n              <div style=\"width:80px;display:flex;flex-direction:column;gap:4px;\">\n                <label style=\"color:#A69C8E;font-size:11px;\">Port<\u002Flabel>\n                <input value=\"{{ connectPort }}\" oninput=\"{{ setConnectPort }}\" style=\"height:30px;background:#201d19;border:1px solid #2E2A24;border-radius:6px;padding:0 10px;color:#EDE8E0;font-size:12.5px;outline:none;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:4px;\">\n              <label style=\"color:#A69C8E;font-size:11px;\">Password<\u002Flabel>\n              <input type=\"password\" value=\"{{ connectPass }}\" oninput=\"{{ setConnectPass }}\" placeholder=\"••••••••\" style=\"height:30px;background:#201d19;border:1px solid #2E2A24;border-radius:6px;padding:0 10px;color:#EDE8E0;font-size:12.5px;outline:none;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:20px;\">\n            <button onclick=\"{{ closeDialog }}\" style=\"height:30px;padding:0 14px;border-radius:6px;border:none;background:transparent;color:#A69C8E;font-size:12.5px;cursor:pointer;\" style-hover=\"background:#262019;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ submitConnect }}\" style=\"height:30px;padding:0 16px;border-radius:6px;border:none;background:#C1673C;color:#1a1611;font-size:12.5px;font-weight:600;cursor:pointer;\" style-hover=\"background:#d07a4e;\">Connect<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showMkdir }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;background:rgba(10,8,6,0.55);display:flex;align-items:center;justify-content:center;z-index:100;\">\n        <div style=\"width:280px;background:#191611;border:1px solid #2E2A24;border-radius:10px;box-shadow:0 30px 60px rgba(0,0,0,0.5);padding:20px;\">\n          <div style=\"color:#EDE8E0;font-size:14.5px;font-weight:600;margin-bottom:12px;\">New Folder<\u002Fdiv>\n          <input value=\"{{ mkdirName }}\" oninput=\"{{ setMkdirName }}\" placeholder=\"Untitled Folder\" style=\"width:100%;box-sizing:border-box;height:30px;background:#201d19;border:1px solid #2E2A24;border-radius:6px;padding:0 10px;color:#EDE8E0;font-size:12.5px;outline:none;\">\n          <div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:16px;\">\n            <button onclick=\"{{ closeDialog }}\" style=\"height:30px;padding:0 14px;border-radius:6px;border:none;background:transparent;color:#A69C8E;font-size:12.5px;cursor:pointer;\" style-hover=\"background:#262019;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ closeDialog }}\" style=\"height:30px;padding:0 16px;border-radius:6px;border:none;background:#C1673C;color:#1a1611;font-size:12.5px;font-weight:600;cursor:pointer;\" style-hover=\"background:#d07a4e;\">Create<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showDelete }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;background:rgba(10,8,6,0.55);display:flex;align-items:center;justify-content:center;z-index:100;\">\n        <div style=\"width:300px;background:#191611;border:1px solid #2E2A24;border-radius:10px;box-shadow:0 30px 60px rgba(0,0,0,0.5);padding:20px;\">\n          <div style=\"display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;\">\n            <iconify-icon icon=\"solar:danger-triangle-bold\" style=\"font-size:20px;color:#B3523E;flex-shrink:0;margin-top:1px;\"><\u002Ficonify-icon>\n            <div>\n              <div style=\"color:#EDE8E0;font-size:14px;font-weight:600;\">Delete \"{{ deleteTarget }}\"?<\u002Fdiv>\n              <div style=\"color:#A69C8E;font-size:11.5px;margin-top:4px;\">This action cannot be undone.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:16px;\">\n            <button onclick=\"{{ closeDialog }}\" style=\"height:30px;padding:0 14px;border-radius:6px;border:none;background:transparent;color:#A69C8E;font-size:12.5px;cursor:pointer;\" style-hover=\"background:#262019;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ closeDialog }}\" style=\"height:30px;padding:0 16px;border-radius:6px;border:none;background:#B3523E;color:#1a1611;font-size:12.5px;font-weight:600;cursor:pointer;\" style-hover=\"background:#c56c53;\">Delete<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showRename }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;background:rgba(10,8,6,0.55);display:flex;align-items:center;justify-content:center;z-index:100;\">\n        <div style=\"width:300px;background:#191611;border:1px solid #2E2A24;border-radius:10px;box-shadow:0 30px 60px rgba(0,0,0,0.5);padding:20px;\">\n          <div style=\"color:#EDE8E0;font-size:14.5px;font-weight:600;margin-bottom:12px;\">Rename<\u002Fdiv>\n          <input value=\"{{ renameValue }}\" oninput=\"{{ setRenameValue }}\" style=\"width:100%;box-sizing:border-box;height:30px;background:#201d19;border:1px solid #2E2A24;border-radius:6px;padding:0 10px;color:#EDE8E0;font-size:12.5px;outline:none;\">\n          <div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:16px;\">\n            <button onclick=\"{{ closeDialog }}\" style=\"height:30px;padding:0 14px;border-radius:6px;border:none;background:transparent;color:#A69C8E;font-size:12.5px;cursor:pointer;\" style-hover=\"background:#262019;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ closeDialog }}\" style=\"height:30px;padding:0 16px;border-radius:6px;border:none;background:#C1673C;color:#1a1611;font-size:12.5px;font-weight:600;cursor:pointer;\" style-hover=\"background:#d07a4e;\">Save<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst ICONS = {\n  dir: { icon: 'solar:folder-bold', color: '#D9A441' },\n  pdf: { icon: 'solar:file-text-bold', color: '#B3523E' },\n  xlsx: { icon: 'solar:document-bold', color: '#7A9471' },\n  png: { icon: 'solar:gallery-bold', color: '#C1673C' },\n  jpg: { icon: 'solar:gallery-bold', color: '#C1673C' },\n  zip: { icon: 'solar:archive-down-minimlistic-bold', color: '#A69C8E' },\n  txt: { icon: 'solar:document-text-bold', color: '#A69C8E' },\n  py: { icon: 'solar:code-bold', color: '#7A9471' },\n  yaml: { icon: 'solar:code-bold', color: '#D9A441' },\n  php: { icon: 'solar:code-bold', color: '#8B4A2C' },\n  css: { icon: 'solar:code-bold', color: '#C1673C' },\n  log: { icon: 'solar:document-text-bold', color: '#6E655A' },\n  htaccess: { icon: 'solar:shield-keyhole-bold', color: '#A69C8E' },\n  default: { icon: 'solar:file-bold', color: '#A69C8E' },\n};\n\nfunction iconFor(name, kind) {\n  if (kind === 'dir') return ICONS.dir;\n  const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : (name.startsWith('.') ? name.slice(1) : '');\n  return ICONS[ext] || ICONS.default;\n}\n\nfunction buildFiles(rows, selectedIdx) {\n  return rows.map((r, i) => {\n    const meta = iconFor(r.name, r.kind);\n    return {\n      name: r.name,\n      size: r.kind === 'dir' ? '—' : r.size,\n      modified: r.modified,\n      icon: meta.icon,\n      iconColor: meta.color,\n      bg: i === selectedIdx ? '#2A2018' : 'transparent',\n    };\n  });\n}\n\nclass Component extends DCLogic {\n  state = {\n    connected: true,\n    activeDialog: null,\n    queueExpanded: true,\n    historyOpen: false,\n    localSelected: 2,\n    remoteSelected: 1,\n    connectHost: '',\n    connectUser: 'deploy',\n    connectPort: '22',\n    connectPass: '',\n    connectProtocol: 'SFTP',\n    mkdirName: '',\n    renameValue: 'index.php',\n    deleteTarget: 'app.log',\n  };\n\n  renderVals() {\n    const s = this.state;\n\n    const localRows = [\n      { name: 'Documents', kind: 'dir', modified: 'Jun 28' },\n      { name: 'Downloads', kind: 'dir', modified: 'Jul 2' },\n      { name: 'Projects', kind: 'dir', modified: 'Jul 3' },\n      { name: 'Pictures', kind: 'dir', modified: 'Jun 12' },\n      { name: 'invoice.xlsx', kind: 'file', size: '48 KB', modified: 'Jul 1' },\n      { name: 'report.pdf', kind: 'file', size: '1.2 MB', modified: 'Jun 30' },\n      { name: 'site-backup.zip', kind: 'file', size: '84.3 MB', modified: 'Jun 29' },\n      { name: 'deploy.py', kind: 'file', size: '3 KB', modified: 'Jun 27' },\n      { name: 'screenshot.png', kind: 'file', size: '620 KB', modified: 'Jun 25' },\n      { name: 'notes.txt', kind: 'file', size: '1 KB', modified: 'Jun 20' },\n    ];\n\n    const remoteRows = [\n      { name: 'public_html', kind: 'dir', modified: 'Jul 2' },\n      { name: 'logs', kind: 'dir', modified: 'Jul 3' },\n      { name: 'backups', kind: 'dir', modified: 'Jun 30' },\n      { name: 'config.yaml', kind: 'file', size: '2 KB', modified: 'Jun 30' },\n      { name: '.htaccess', kind: 'file', size: '1 KB', modified: 'Jun 18' },\n      { name: 'index.php', kind: 'file', size: '4 KB', modified: 'Jul 3' },\n      { name: 'style.css', kind: 'file', size: '18 KB', modified: 'Jun 22' },\n      { name: 'app.log', kind: 'file', size: '9.4 MB', modified: 'Jul 3' },\n    ];\n\n    const localBookmarksBase = [\n      { label: 'Home', icon: 'solar:home-2-bold', path: '~' },\n      { label: 'Desktop', icon: 'solar:monitor-bold', path: '~/Desktop' },\n      { label: 'Documents', icon: 'solar:document-bold', path: '~/Documents' },\n      { label: 'Downloads', icon: 'solar:download-square-bold', path: '~/Downloads' },\n    ];\n    const localBookmarks = localBookmarksBase.map((b, i) => ({\n      ...b,\n      color: i === 0 ? '#C1673C' : '#A69C8E',\n      textColor: i === 0 ? '#EDE8E0' : '#EDE8E0',\n      bg: i === 0 ? '#2A2018' : 'transparent',\n      onClick: () => {},\n    }));\n\n    const drives = [\n      { label: '/ (root)', icon: 'solar:ssd-square-linear' },\n      { label: 'backup-drive', icon: 'solar:database-linear' },\n    ];\n\n    const queueTasksRaw = [\n      { name: 'site-backup.zip', dir: 'up', progress: 68, status: 'active', speed: '4.2 MB/s' },\n      { name: 'photo-final.png', dir: 'down', progress: 100, status: 'done', speed: '' },\n      { name: 'invoice-batch.pdf', dir: 'up', progress: 0, status: 'queued', speed: '' },\n      { name: 'video-export.mp4', dir: 'down', progress: 34, status: 'paused', speed: '' },\n    ];\n    const queueTasks = queueTasksRaw.map(t => ({\n      name: t.name,\n      dirIcon: t.dir === 'up' ? 'solar:upload-linear' : 'solar:download-linear',\n      dirColor: t.dir === 'up' ? '#C1673C' : '#7A9471',\n      progressWidth: t.progress + '%',\n      progressLabel: t.progress + '%',\n      barColor: t.status === 'done' ? '#7A9471' : (t.status === 'paused' ? '#6E655A' : '#C1673C'),\n      statusLabel: t.status === 'active' ? t.speed : (t.status === 'done' ? 'Complete' : (t.status === 'paused' ? 'Paused' : 'Queued')),\n      actionIcon: t.status === 'done' ? 'solar:check-circle-bold' : (t.status === 'paused' ? 'solar:play-circle-linear' : 'solar:pause-circle-linear'),\n    }));\n\n    const historyItems = [\n      { label: 'deploy@prod.example.com', time: '2h ago' },\n      { label: 'admin@staging.internal', time: 'Yesterday' },\n      { label: 'ftpuser@files.example.net', time: 'Jun 28' },\n    ];\n\n    const protocols = ['SFTP', 'FTP', 'FTPS'].map(p => ({\n      label: p,\n      bg: s.connectProtocol === p ? '#8B4A2C' : '#201d19',\n      color: s.connectProtocol === p ? '#EDE8E0' : '#A69C8E',\n      onClick: () => this.setState({ connectProtocol: p }),\n    }));\n\n    const connectedIconColor = s.connected ? '#A69C8E' : '#4a453d';\n\n    return {\n      windowTitle: s.connected ? `deploy@${s.connectHost || 'prod.example.com'} — LoFlum` : 'LoFlum',\n      connected: s.connected,\n      notConnected: !s.connected,\n      tabLabel: `deploy@${s.connectHost || 'prod.example.com'}`,\n      localPath: '~/Projects',\n      remoteHost: s.connectHost || 'prod.example.com',\n      remotePath: '/public_html',\n\n      localFiles: buildFiles(localRows, s.localSelected),\n      remoteFiles: buildFiles(remoteRows, s.remoteSelected),\n      localBookmarks,\n      drives,\n      queueTasks,\n      historyItems,\n      protocols,\n\n      queueCount: queueTasksRaw.filter(t => t.status !== 'done').length,\n      queueExpanded: s.queueExpanded,\n      queueHeight: s.queueExpanded ? '190px' : '34px',\n      queueChevron: s.queueExpanded ? 'solar:alt-arrow-down-linear' : 'solar:alt-arrow-up-linear',\n      queueSummary: `${queueTasksRaw.length} transfers · 1 active`,\n      queueBtnBg: s.queueExpanded ? '#241D14' : 'transparent',\n      queueBtnColor: s.queueExpanded ? '#C1673C' : '#EDE8E0',\n\n      historyOpen: s.historyOpen,\n      historyBtnBg: s.historyOpen ? '#241D14' : 'transparent',\n      historyBtnColor: s.historyOpen ? '#C1673C' : '#EDE8E0',\n\n      uploadColor: connectedIconColor,\n      downloadColor: connectedIconColor,\n      connectedIconColor,\n\n      statusMessage: s.connected ? `Connected to ${s.connectHost || 'prod.example.com'}` : 'Not connected',\n      connectedCountLabel: s.connected ? '1 connection' : '0 connections',\n\n      showConnect: s.activeDialog === 'connect',\n      showMkdir: s.activeDialog === 'mkdir',\n      showDelete: s.activeDialog === 'delete',\n      showRename: s.activeDialog === 'rename',\n\n      connectHost: s.connectHost,\n      connectUser: s.connectUser,\n      connectPort: s.connectPort,\n      connectPass: s.connectPass,\n      setConnectHost: e => this.setState({ connectHost: e.target.value }),\n      setConnectUser: e => this.setState({ connectUser: e.target.value }),\n      setConnectPort: e => this.setState({ connectPort: e.target.value }),\n      setConnectPass: e => this.setState({ connectPass: e.target.value }),\n\n      mkdirName: s.mkdirName,\n      setMkdirName: e => this.setState({ mkdirName: e.target.value }),\n      renameValue: s.renameValue,\n      setRenameValue: e => this.setState({ renameValue: e.target.value }),\n      deleteTarget: s.deleteTarget,\n\n      openConnectDialog: () => this.setState({ activeDialog: 'connect' }),\n      openMkdirDialog: () => this.setState({ activeDialog: 'mkdir' }),\n      openDeleteDialog: () => this.setState({ activeDialog: 'delete' }),\n      openRenameDialog: () => this.setState({ activeDialog: 'rename' }),\n      closeDialog: () => this.setState({ activeDialog: null }),\n      submitConnect: () => this.setState({ activeDialog: null, connected: true }),\n      disconnect: () => this.setState({ connected: false }),\n      toggleQueue: () => this.setState({ queueExpanded: !s.queueExpanded }),\n      toggleHistory: () => this.setState({ historyOpen: !s.historyOpen }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
